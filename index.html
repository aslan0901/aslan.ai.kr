<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Into Guru 스타일 홈페이지</title>
    <style>
        /* 기본 스타일 및 폰트 */
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Pretendard', sans-serif; background-color: #f8f9fa; color: #333; }
        
        /* 메인 섹션 (Hero) */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: linear-gradient(135deg, #ffffff 0%, #e9ecef 100%); }
        .hero h1 { font-size: 3.5rem; margin-bottom: 1rem; color: #1a1a1a; }
        .hero p { font-size: 1.2rem; color: #666; margin-bottom: 2rem; max-width: 600px; }

        /* 버튼 스타일 */
        .btn { padding: 12px 30px; font-size: 1rem; background-color: #000; color: #fff; text-decoration: none; border-radius: 50px; transition: 0.3s; }
        .btn:hover { background-color: #333; transform: translateY(-3px); }

        /* 반응형 설정 */
        @media (max-width: 768px) { .hero h1 { font-size: 2.5rem; } }
    </style>
</head>
<body>
    <section class="hero">
        <h1>Welcome to Into Guru</h1>
        <p>세상의 모든 인사이트를 한곳에서 경험하세요.<br>당신의 비즈니스를 위한 최적의 가이드를 제공합니다.</p>
        <a href="#contact" class="btn">시작하기</a>
    </section>
</body>
</html>
